name: CI/CD — Build & Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ────────────────────────────────────────────────────────
  # JOB 1 : Build & Push vers DockerHub
  # ────────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          chmod +x ./docker/scripts/build.sh
          ./docker/scripts/build.sh

  # ────────────────────────────────────────────────────────
  # JOB 2 : Déploiement sur le serveur via SSH
  # ────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy sur le serveur
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Copier les fichiers sur le serveur
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,docker/scripts/"
          target: "/opt/backend-gettruck"

      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/backend-gettruck

            # Écriture du .env depuis les secrets GitHub
            cat > .env << ENVEOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            ENVEOF

            chmod +x ./docker/scripts/deploy.sh
            ./docker/scripts/deploy.sh

            chmod +x ./docker/scripts/health-check.sh
            ./docker/scripts/health-check.sh