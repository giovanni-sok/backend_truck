name: CI/CD — Build & Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ────────────────────────────────────────────────────────
  # JOB 1 : Build & Push vers DockerHub
  # ────────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          chmod +x ./docker/scripts/build.sh
          ./docker/scripts/build.sh

  # ────────────────────────────────────────────────────────
  # JOB 2 : Déploiement sur le serveur
  # ────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy sur le serveur
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Vérifier la connectivité
        run: |
          nc -zv -w 10 ${{ secrets.SERVER_HOST }} ${{ secrets.SERVER_PORT || 22 }} \
          && echo "✅ Port accessible" \
          || echo "❌ Port inaccessible"

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -l -f ~/.ssh/id_ed25519
          cat > ~/.ssh/config << SSHEOF
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
          LogLevel ERROR
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Créer le dossier sur le serveur
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "sudo mkdir -p /opt/backend-gettruck/docker/scripts && \
             sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /opt/backend-gettruck"

      - name: Copier docker-compose.yml
        run: |
          scp -i ~/.ssh/id_ed25519 \
            -P ${{ secrets.SERVER_PORT || 22 }} \
            docker-compose.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/backend-gettruck/

      - name: Copier les scripts et la config Nginx
        run: |
          scp -i ~/.ssh/id_ed25519 \
            -P ${{ secrets.SERVER_PORT || 22 }} \
            docker/scripts/build.sh \
            docker/scripts/deploy.sh \
            docker/scripts/health-check.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/backend-gettruck/docker/scripts/
          scp -i ~/.ssh/id_ed25519 \
            -P ${{ secrets.SERVER_PORT || 22 }} \
            nginx/backend-gettruck.totonlionel.com.conf \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/backend-gettruck/

      - name: Écrire le .env sur le serveur
        run: |
          cat > /tmp/.env << 'EOF'
          DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          IMAGE_TAG="${{ env.IMAGE_TAG }}"
          POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
          POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
          POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          EMAIL_USER="${{ secrets.EMAIL_USER }}"
          EMAIL_PASS="${{ secrets.EMAIL_PASS }}"
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          EOF
          sed -i 's/\r//g' /tmp/.env
          scp -i ~/.ssh/id_ed25519 \
            -P ${{ secrets.SERVER_PORT || 22 }} \
            /tmp/.env \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/backend-gettruck/.env

      - name: Lancer le déploiement
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SERVER_PORT || 22 }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd /opt/backend-gettruck && \
             chmod +x ./docker/scripts/deploy.sh && \
             chmod +x ./docker/scripts/health-check.sh && \
             ./docker/scripts/deploy.sh && \
             ./docker/scripts/health-check.sh"

  # ────────────────────────────────────────────────────────
  # JOB 3 : Setup Nginx + SSL (après déploiement)
  # ────────────────────────────────────────────────────────
  ssl-setup:
    name: 🔒 Setup Nginx + SSL
    runs-on: ubuntu-latest
    needs: deploy   # ← attend que l'app tourne
    steps:
      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config << SSHEOF
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
          LogLevel ERROR
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Préparer et envoyer la config Nginx initiale
        run: |
          cat > /tmp/gettruck-nginx.conf << 'EOF'
          server {
              listen 80;
              server_name backend-gettruck.totonlionel.com;

              location / {
                  proxy_pass http://localhost:5001;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_connect_timeout 60s;
                  proxy_send_timeout    60s;
                  proxy_read_timeout    60s;
              }
          }
          EOF
          scp -i ~/.ssh/id_ed25519 \
            -P ${{ secrets.SERVER_PORT || 22 }} \
            /tmp/gettruck-nginx.conf \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/gettruck-nginx.conf

      - name: Installer Nginx + Certbot et configurer SSL
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SERVER_PORT || 22 }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'

            # Installer si pas déjà présent
            if ! command -v nginx &> /dev/null; then
              sudo apt update -y
              sudo apt install -y nginx certbot python3-certbot-nginx
            fi

            # Installer certbot si absent
            if ! command -v certbot &> /dev/null; then
              sudo apt update -y
              sudo apt install -y certbot python3-certbot-nginx
            fi

            # Ouvrir les ports
            sudo ufw allow 22/tcp
            sudo ufw allow 80/tcp
            sudo ufw allow 443/tcp
            sudo ufw --force enable

            # Supprimer la config par défaut de Nginx
            sudo rm -f /etc/nginx/sites-enabled/default

            # Ne créer la config initiale QUE si elle n'existe PAS encore
            # (pour ne pas écraser la version modifiée par Certbot)
            if [ ! -f /etc/nginx/sites-available/gettruck ]; then
              echo "📝 Première installation : création de la config Nginx HTTP"
              sudo cp /tmp/gettruck-nginx.conf /etc/nginx/sites-available/gettruck
              sudo cp /opt/backend-gettruck/backend-gettruck.totonlionel.com.conf /etc/nginx/sites-available/backend-gettruck.totonlionel.com.conf
              sudo ln -sf /etc/nginx/sites-available/gettruck /etc/nginx/sites-enabled/
            else
              echo "✅ Config Nginx existante trouvée, conservation de la config SSL"
            fi

            # Nettoyer le fichier temporaire
            rm -f /tmp/gettruck-nginx.conf

            # Vérifier et recharger Nginx
            sudo nginx -t && sudo systemctl reload nginx

            # Générer ou renouveler SSL
            if [ ! -d "/etc/letsencrypt/live/backend-gettruck.totonlionel.com" ]; then
              echo "🔐 Génération du certificat SSL..."
              sudo certbot --nginx -d backend-gettruck.totonlionel.com \
                --non-interactive \
                --agree-tos \
                --email "$CERTBOT_EMAIL"
            else
              echo "🔄 Renouvellement du certificat si nécessaire..."
              sudo certbot renew --quiet
            fi

            # Recharger Nginx après Certbot pour appliquer le SSL
            sudo nginx -t && sudo systemctl reload nginx

            echo "✅ Nginx + SSL configurés avec succès"

          ENDSSH
        env:
          CERTBOT_EMAIL: ${{ secrets.EMAIL_USER }}