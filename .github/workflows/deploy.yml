name: CI/CD — Build & Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ────────────────────────────────────────────────────────
  # JOB 1 : Build & Push vers DockerHub
  # ────────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          chmod +x ./docker/scripts/build.sh
          ./docker/scripts/build.sh

  # ────────────────────────────────────────────────────────
  # JOB 2 : Déploiement sur le serveur
  # ────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy sur le serveur
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Vérifier la connectivité
        run: |
          nc -zv -w 10 ${{ secrets.SERVER_HOST }} ${{ secrets.SERVER_PORT || 22 }} \
          && echo "✅ Port accessible" \
          || echo "❌ Port inaccessible"

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -l -f ~/.ssh/id_ed25519
          cat > ~/.ssh/config << SSHEOF
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
          LogLevel ERROR
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Créer le dossier sur le serveur
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "sudo mkdir -p /opt/backend-gettruck/docker/scripts && \
             sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /opt/backend-gettruck"

      - name: Copier docker-compose.yml
        run: |
          scp -i ~/.ssh/id_ed25519 \
            -P ${{ secrets.SERVER_PORT || 22 }} \
            docker-compose.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/backend-gettruck/

      - name: Copier les scripts et la config Nginx
        run: |
          scp -i ~/.ssh/id_ed25519 \
            -P ${{ secrets.SERVER_PORT || 22 }} \
            docker/scripts/build.sh \
            docker/scripts/deploy.sh \
            docker/scripts/health-check.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/backend-gettruck/docker/scripts/
          scp -i ~/.ssh/id_ed25519 \
            -P ${{ secrets.SERVER_PORT || 22 }} \
            nginx/backend-gettruck.totonlionel.com.conf \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/backend-gettruck/

      - name: Écrire le .env sur le serveur
        run: |
          cat > /tmp/.env << 'EOF'
          DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          IMAGE_TAG="${{ env.IMAGE_TAG }}"
          POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
          POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
          POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          EMAIL_USER="${{ secrets.EMAIL_USER }}"
          EMAIL_PASS="${{ secrets.EMAIL_PASS }}"
          FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
          EOF
          sed -i 's/\r//g' /tmp/.env
          scp -i ~/.ssh/id_ed25519 \
            -P ${{ secrets.SERVER_PORT || 22 }} \
            /tmp/.env \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/backend-gettruck/.env

      - name: Lancer le déploiement
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SERVER_PORT || 22 }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd /opt/backend-gettruck && \
             chmod +x ./docker/scripts/deploy.sh && \
             chmod +x ./docker/scripts/health-check.sh && \
             ./docker/scripts/deploy.sh && \
             ./docker/scripts/health-check.sh"

  # ────────────────────────────────────────────────────────
  # JOB 3 : Setup Nginx + SSL (après déploiement)
  # ────────────────────────────────────────────────────────
  ssl-setup:
    name: 🔒 Setup Nginx + SSL
    runs-on: ubuntu-latest
    needs: deploy   # ← attend que l'app tourne
    steps:
      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config << SSHEOF
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
          LogLevel ERROR
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Installer Nginx + Certbot et configurer SSL
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SERVER_PORT || 22 }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'

            # ── Installer Nginx + Certbot si absent ──
            if ! command -v nginx &> /dev/null; then
              sudo apt update -y
              sudo apt install -y nginx certbot python3-certbot-nginx
            fi
            if ! command -v certbot &> /dev/null; then
              sudo apt update -y
              sudo apt install -y certbot python3-certbot-nginx
            fi

            # ── Ouvrir les ports ──
            sudo ufw allow 22/tcp
            sudo ufw allow 80/tcp
            sudo ufw allow 443/tcp
            sudo ufw --force enable

            # ── Supprimer les anciennes configs ──
            # sudo rm -f /etc/nginx/sites-enabled/default
            sudo rm -f /etc/nginx/sites-available/gettruck
            sudo rm -f /etc/nginx/sites-enabled/gettruck

            # ── Générer le certificat SSL si absent ──
            if [ ! -d "/etc/letsencrypt/live/backend-gettruck.totonlionel.com" ]; then
              echo "🔐 Génération du certificat SSL (standalone)..."
              sudo systemctl stop nginx
              sudo certbot certonly --standalone \
                -d backend-gettruck.totonlionel.com \
                --non-interactive \
                --agree-tos \
                --email "$CERTBOT_EMAIL"
              sudo systemctl start nginx
            else
              echo "✅ Certificats SSL déjà présents"
              sudo certbot renew --quiet || true
            fi

            # ── Déployer la config Nginx complète (HTTP + HTTPS) ──
            echo "📝 Déploiement de la config Nginx avec SSL..."
            sudo cp /opt/backend-gettruck/backend-gettruck.totonlionel.com.conf \
              /etc/nginx/sites-available/backend-gettruck.totonlionel.com.conf
            sudo ln -sf /etc/nginx/sites-available/backend-gettruck.totonlionel.com.conf \
              /etc/nginx/sites-enabled/backend-gettruck.totonlionel.com.conf

            # ── Vérifier et recharger Nginx ──
            sudo nginx -t && sudo systemctl reload nginx

            echo "✅ Nginx + SSL configurés avec succès"

          ENDSSH
        env:
          CERTBOT_EMAIL: ${{ secrets.EMAIL_USER }}