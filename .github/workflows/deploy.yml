name: CI/CD — Build & Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ────────────────────────────────────────────────────────
  # JOB 1 : Build & Push vers DockerHub
  # ────────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          chmod +x ./docker/scripts/build.sh
          ./docker/scripts/build.sh

  # ────────────────────────────────────────────────────────
  # JOB 2 : Déploiement sur le serveur via SSH/SCP natifs
  # ────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy sur le serveur
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Écriture propre de la clé privée
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Vérification que la clé est bien valide
          ssh-keygen -l -f ~/.ssh/id_ed25519

          # Config SSH : désactive StrictHostKeyChecking pour éviter le blocage ssh-keyscan
          cat > ~/.ssh/config << SSHEOF
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
          LogLevel ERROR
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Créer le dossier sur le serveur
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "sudo mkdir -p /opt/backend-gettruck/docker/scripts && sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /opt/backend-gettruck"

      - name: Copier docker-compose.yml
        run: |
          scp -i ~/.ssh/id_ed25519 \
            -P ${{ secrets.SERVER_PORT || 22 }} \
            docker-compose.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/backend-gettruck/

      - name: Copier les scripts
        run: |
          scp -i ~/.ssh/id_ed25519 \
            -P ${{ secrets.SERVER_PORT || 22 }} \
            docker/scripts/build.sh \
            docker/scripts/deploy.sh \
            docker/scripts/health-check.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/backend-gettruck/docker/scripts/

      - name: Écrire le .env sur le serveur
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SERVER_PORT || 22 }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cat > /opt/backend-gettruck/.env" << EOF
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG=${{ env.IMAGE_TAG }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EMAIL_USER=${{ secrets.EMAIL_USER }}
          EMAIL_PASS=${{ secrets.EMAIL_PASS }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          EOF

      - name: Lancer le déploiement
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SERVER_PORT || 22 }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd /opt/backend-gettruck && \
             chmod +x ./docker/scripts/deploy.sh && \
             chmod +x ./docker/scripts/health-check.sh && \
             ./docker/scripts/deploy.sh && \
             ./docker/scripts/health-check.sh"